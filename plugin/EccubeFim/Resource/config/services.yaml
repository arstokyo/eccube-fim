parameters:
    fim.status_file:     '/var/lib/eccube-fim/status.json'
    malware.status_file: '/var/lib/eccube-fim/malware_status.json'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    # explicit argument override — status file paths are not type-hintable
    Plugin\EccubeFim\Service\FimStatusService:
        arguments:
            - '%fim.status_file%'

    Plugin\EccubeFim\Service\MalwareStatusService:
        arguments:
            - '%malware.status_file%'
