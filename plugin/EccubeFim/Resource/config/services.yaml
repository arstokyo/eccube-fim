parameters:
    fim.status_file: '/var/lib/eccube-fim/status.json'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    # explicit argument override — fim.status_file is not type-hintable
    Plugin\EccubeFim\Service\FimStatusService:
        arguments:
            - '%fim.status_file%'
