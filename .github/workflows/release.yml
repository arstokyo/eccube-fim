name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Stamp __version__ in fim/version.py
        run: |
          sed -i "s/__version__ = \".*\"/__version__ = \"${VERSION}\"/" fim/version.py

      - name: Build release tarball
        run: |
          DIST="eccube-fim-${GITHUB_REF_NAME}"
          mkdir "$DIST"
          cp -r fim bin config \
                eccube-fim-check.service eccube-fim-check.timer \
                eccube-fim.logrotate install.sh \
                "$DIST/"
          tar -czf "${DIST}.tar.gz" "$DIST/"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: eccube-fim ${{ github.ref_name }}
          body: |
            ## eccube-fim ${{ github.ref_name }}

            See [CHANGELOG](https://github.com/arstokyo/eccube-fim/blob/main/CHANGELOG.md)
            for details.

            ---
            python_requires: ">=3.9"
          files: eccube-fim-${{ github.ref_name }}.tar.gz
